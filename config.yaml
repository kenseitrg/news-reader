db_path: data/news_reader.db

model:
  path: utrobinmv/t5_summary_en_ru_zh_base_2048
  n_ctx: 2048
  n_threads: 4

summarizer:
  prompt: "Summarize this news article in 2-3 sentences and extract 3-5 key topics/keywords.\n\nArticle:\n{text}\n\nSummary:\nKeywords:"
  max_tokens: 256
  temperature: 0.3

embedding:
  model: intfloat/multilingual-e5-small

ranking:
  freshness_weight: 0.25
  source_weight: 0.25
  author_weight: 0.25
  embedding_weight: 0.25
  auto_filter_threshold: 0.0

sources: []
